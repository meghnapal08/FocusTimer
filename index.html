<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Focus">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Focus Timer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --text: rgba(40,28,16,0.90); --muted: rgba(40,28,16,0.38);
  --card: rgba(255,255,255,0.38); --card-b: rgba(0,0,0,0.10);
  --btn: rgba(0,0,0,0.07); --btn-b: rgba(0,0,0,0.12);
  --work: #b05c30; --brk: #2a7850; --accent: #7a4a28;
  --input-bg: rgba(0,0,0,0.08); --input-text: rgba(40,28,16,0.88);
  --track: rgba(0,0,0,0.10);
}
[data-dark="true"] {
  --text: rgba(238,228,210,0.93); --muted: rgba(238,228,210,0.38);
  --card: rgba(0,0,0,0.28); --card-b: rgba(255,255,255,0.10);
  --btn: rgba(255,255,255,0.09); --btn-b: rgba(255,255,255,0.16);
  --work: #ffa070; --brk: #72e0a8; --accent: #ffc090;
  --input-bg: rgba(255,255,255,0.12); --input-text: rgba(238,228,210,0.92);
  --track: rgba(255,255,255,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html {
  height: 100%;
  height: -webkit-fill-available;
}

body {
  width: 100%; height: 100%;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  /* Prevent iOS bounce scroll */
  position: fixed;
  inset: 0;
}

/* ── APP SHELL ── */
#app {
  width: 100%;
  height: 100dvh;
  min-height: -webkit-fill-available;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: background 0.5s ease;
  /* Room for chips at bottom */
  padding-bottom: 80px;
  padding-top: max(env(safe-area-inset-top, 0px), 0px);
}

/* ── THEMES ── */
.t-sand   { background: linear-gradient(160deg,#f5ede0,#e8d5b7,#f0e0c8); }
.t-sage   { background: linear-gradient(160deg,#d4e8d0,#b8d4b2,#cce0c8); }
.t-ocean  { background: linear-gradient(160deg,#d0e8f4,#b0d4ec,#c8e0f0); }
.t-rose   { background: linear-gradient(160deg,#f4d0d8,#edb8c4,#f0c8d0); }
.t-slate  { background: linear-gradient(160deg,#2c3e50,#34495e,#2a3a4a); }
.t-dusk   { background: linear-gradient(160deg,#e8d5f0,#d4b8e8,#e0ccf4); }
.t-night  { background: linear-gradient(160deg,#1a1a2e,#16213e,#0f3060); }
.t-forest { background: linear-gradient(160deg,#1a2e1a,#1e3a1e,#243024); }
.t-black  { background: #000; }
.t-ink    { background: linear-gradient(160deg,#0a0a0f,#111118,#0d0d14); }
.t-terra  { background: linear-gradient(160deg,#3d1c10,#5a2a18,#3d1c10); }
.t-stone  { background: linear-gradient(160deg,#2a2a28,#383835,#2a2a28); }
.t-cream  { background: linear-gradient(160deg,#faf6ef,#f2ebe0,#faf6ef); }
.t-mist   { background: linear-gradient(160deg,#dde4ec,#c8d4e0,#dde4ec); }

/* ── TOP-RIGHT BUTTONS ── */
.top-bar {
  position: absolute;
  top: max(env(safe-area-inset-top, 14px), 14px);
  right: 1rem;
  display: flex; gap: 8px; z-index: 10;
}
.icon-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--btn); border: 0.5px solid var(--btn-b); color: var(--text);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.12s;
}
.icon-btn:active { transform: scale(0.90); }

/* ── MAIN CONTENT — centres the timer ── */
.main {
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  width: 100%;
  gap: 0;
}

/* ── PHASE LABEL — tiny, above timer ── */
.phase-label {
  font-size: clamp(0.55rem, 1.6vw, 0.8rem);
  font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase;
  margin-bottom: 0.4em; transition: color 0.4s; opacity: 0.85;
}

/* ── THE HERO TIMER ── */
.timer {
  font-family: 'Nunito', sans-serif;
  /* Fills screen width on portrait, constrained by height on landscape/desktop */
  font-size: min(28vw, 38vh);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -0.03em;
  color: var(--text);
  width: 100%;
  text-align: center;
  padding: 0 1vw;
}

/* ── THIN PROGRESS BAR ── */
.progress-wrap {
  width: min(50vw, 260px); height: 2px;
  background: var(--track); border-radius: 2px; overflow: hidden;
  margin: clamp(0.6rem, 2vh, 1.2rem) auto;
}
.progress-bar { height: 100%; border-radius: 2px; transition: width 0.6s linear, background 0.4s; }

/* ── CONTROLS — small and subtle ── */
.controls { display: flex; align-items: center; gap: clamp(8px, 2vw, 16px); }

.ctrl-btn {
  width: clamp(36px, 5.5vw, 52px);
  height: clamp(36px, 5.5vw, 52px);
  border-radius: 50%;
  background: var(--btn); border: 0.5px solid var(--btn-b); color: var(--text);
  font-size: clamp(13px, 2vw, 18px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.12s, opacity 0.2s;
}
.ctrl-btn:active { transform: scale(0.91); }
.ctrl-btn:disabled { opacity: 0.22; pointer-events: none; }

.play-btn {
  width: clamp(48px, 7vw, 68px);
  height: clamp(48px, 7vw, 68px);
  font-size: clamp(16px, 2.5vw, 24px);
}

/* ── CHIPS FOOTER — pinned to bottom, very small ── */
.chips-footer {
  position: absolute;
  bottom: max(env(safe-area-inset-bottom, 10px), 10px);
  left: 0; right: 0;
  display: flex; justify-content: center;
  padding: 0 0.5rem;
}

/* Single row always; portrait wraps to 5-per-row via grid below */
.chips {
  display: flex;
  flex-wrap: nowrap;
  justify-content: center;
  align-items: center;
  gap: 3px;
}

.chip {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 5px; border-radius: 7px; cursor: pointer;
  transition: transform 0.15s, background 0.2s;
  min-width: 32px;
}
.chip:active { transform: scale(0.93); }
.chip.active { transform: scale(1.08); }
.chip.done   { opacity: 0.38; }

.chip-dot      { width: 6px; height: 6px; }
.chip-dot.work { border-radius: 2px; }
.chip-dot.brk  { border-radius: 50%; }

.chip-tick {
  width: 12px; height: 12px; border-radius: 50%; background: #22c55e;
  display: flex; align-items: center; justify-content: center;
  animation: tickPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes tickPop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.chip-tick svg { width: 7px; height: 7px; }

.chip-dur { font-size: 0.58rem; font-family: 'DM Sans', sans-serif; color: var(--text); font-weight: 500; }
.chip-lbl { font-size: 0.44rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }

/* ── FINISHED SCREEN ── */
.finished {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; padding: 2rem;
  height: 100%; width: 100%;
}
.finished-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2rem, 8vw, 4rem);
  color: var(--text); margin-bottom: 0.5rem;
}
.finished-sub { font-size: clamp(0.8rem, 2vw, 1rem); color: var(--muted); margin-bottom: 2rem; }
.text-btn {
  padding: 12px 30px; border-radius: 24px;
  background: var(--btn); border: 0.5px solid var(--btn-b); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.95rem; cursor: pointer;
  transition: transform 0.12s;
}
.text-btn:active { transform: scale(0.95); }

/* ── PANEL OVERLAY ── */
.panel-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 20; display: flex; align-items: flex-end;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0}to{opacity:1} }
.panel {
  width: 100%; max-height: 88vh; border-radius: 20px 20px 0 0;
  padding: 1.5rem 1.25rem calc(env(safe-area-inset-bottom,16px) + 1rem);
  overflow-y: auto; animation: slideUp 0.25s ease;
}
@keyframes slideUp { from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1} }
.panel-handle { width: 38px; height: 4px; background: var(--track); border-radius: 2px; margin: 0 auto 1.2rem; }
.panel-title {
  font-family: 'DM Serif Display', serif; font-size: 1.4rem;
  color: var(--text); margin-bottom: 1rem;
}
.edit-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-radius: 10px; background: var(--card); border: 0.5px solid var(--card-b); margin-bottom: 6px;
}
.edit-row label { flex:1; font-size: 0.85rem; color: var(--text); }
.edit-input {
  width: 60px; padding: 6px 8px; border-radius: 7px;
  background: var(--input-bg); color: var(--input-text);
  font-family: 'DM Sans', monospace; font-size: 0.95rem;
  text-align: center; border: none; outline: none;
}
.edit-unit { font-size: 0.75rem; color: var(--muted); }
.save-btn {
  width: 100%; padding: 14px; border-radius: 14px;
  background: var(--accent); color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500;
  border: none; cursor: pointer; margin-top: 1rem;
  transition: transform 0.12s, opacity 0.15s;
}
.save-btn:active { transform: scale(0.97); opacity: 0.9; }
.bg-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.2rem; }
.bg-swatch {
  aspect-ratio: 1; border-radius: 10px; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px;
  font-size: 0.58rem; color: rgba(255,255,255,0.8); font-weight: 500;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.bg-swatch.sel { border-color: rgba(255,255,255,0.8); transform: scale(1.06); }

/* ── PORTRAIT PHONE: chips wrap 5-per-row ── */
@media (orientation: portrait) and (max-width: 500px) {
  .chips {
    display: grid;
    grid-template-columns: repeat(5, auto);
    justify-content: center;
    gap: 3px;
  }
  #app { padding-bottom: 130px; }
}

/* ── LANDSCAPE PHONE: tighter vertical spacing ── */
@media (orientation: landscape) and (max-height: 500px) {
  #app {
    padding-bottom: 60px;
    padding-top: 0;
    justify-content: center;
  }
  .main { gap: 0; }
  .progress-wrap { margin: 0.4rem auto; }
  .chip { padding: 3px 4px; min-width: 28px; }
  .chip-dur { font-size: 0.5rem; }
  .chip-lbl { font-size: 0.38rem; }
}
</style>
</head>
<body>

<div id="app" class="t-sand">
  <div class="top-bar">
    <button class="icon-btn" id="btn-edit" aria-label="Edit timers">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
    </button>
    <button class="icon-btn" id="btn-bg" aria-label="Change background">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>

  <div id="main-view" class="main" style="display:none"></div>
  <div id="finished-view" class="finished" style="display:none"></div>
  <div class="chips-footer"><div class="chips" id="chips-row"></div></div>
</div>

<script>
const THEMES = [
  { id:'sand',  cls:'t-sand',   dark:false, bg:'linear-gradient(135deg,#f5ede0,#e8d5b7)', lbl:'Sand'   },
  { id:'sage',  cls:'t-sage',   dark:false, bg:'linear-gradient(135deg,#d4e8d0,#b8d4b2)', lbl:'Sage'   },
  { id:'ocean', cls:'t-ocean',  dark:false, bg:'linear-gradient(135deg,#d0e8f4,#b0d4ec)', lbl:'Ocean'  },
  { id:'rose',  cls:'t-rose',   dark:false, bg:'linear-gradient(135deg,#f4d0d8,#edb8c4)', lbl:'Rose'   },
  { id:'slate', cls:'t-slate',  dark:true,  bg:'linear-gradient(135deg,#2c3e50,#34495e)', lbl:'Slate'  },
  { id:'dusk',  cls:'t-dusk',   dark:false, bg:'linear-gradient(135deg,#e8d5f0,#d4b8e8)', lbl:'Dusk'   },
  { id:'night', cls:'t-night',  dark:true,  bg:'linear-gradient(135deg,#1a1a2e,#0f3060)', lbl:'Night'  },
  { id:'forest',cls:'t-forest', dark:true,  bg:'linear-gradient(135deg,#1a2e1a,#243024)', lbl:'Forest' },
  { id:'black', cls:'t-black',  dark:true,  bg:'#000',                                    lbl:'Black'  },
  { id:'ink',   cls:'t-ink',    dark:true,  bg:'linear-gradient(135deg,#0a0a0f,#111118)', lbl:'Ink'    },
  { id:'terra', cls:'t-terra',  dark:true,  bg:'linear-gradient(135deg,#3d1c10,#5a2a18)', lbl:'Terra'  },
  { id:'stone', cls:'t-stone',  dark:true,  bg:'linear-gradient(135deg,#2a2a28,#383835)', lbl:'Stone'  },
  { id:'cream', cls:'t-cream',  dark:false, bg:'linear-gradient(135deg,#faf6ef,#f2ebe0)', lbl:'Cream'  },
  { id:'mist',  cls:'t-mist',   dark:false, bg:'linear-gradient(135deg,#dde4ec,#c8d4e0)', lbl:'Mist'   },
];

let workMins     = [50,40,30,20,10];
let breakMins    = [10,10,10,10];
let themeId      = 'sand';
let stepIdx      = 0;
let secsLeft     = workMins[0]*60;
let running      = false;
let finished     = false;
let timer        = null;
let completedSet = new Set();

function buildSeq(){
  const s=[];
  workMins.forEach((w,i)=>{
    s.push({type:'work',mins:w,session:i+1});
    if(i<workMins.length-1) s.push({type:'break',mins:breakMins[i]||10,session:i+1});
  });
  return s;
}

// ── AUDIO ──────────────────────────────────────────────────────────────
function chime(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const isDark=THEMES.find(t=>t.id===themeId)?.dark;
    [0,0.18,0.36].forEach((delay,i)=>{
      const freqs=isDark?[392,494,587]:[523,659,784];
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freqs[i];o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+delay);
      g.gain.linearRampToValueAtTime(0.2,ctx.currentTime+delay+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.75);
      o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+0.8);
    });
  }catch(e){}
}

// ── CONFETTI — CSS transitions, works on iOS ───────────────────────────
function fireConfetti(chipEl){
  const rect=chipEl.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff85e1','#ffb347','#a0f0a0','#80d8ff'];
  for(let i=0;i<28;i++){
    const el=document.createElement('div');
    const sz=3+Math.random()*6;
    const angle=Math.random()*Math.PI*2;
    const speed=60+Math.random()*100;
    const dx=Math.cos(angle)*speed;
    const dy=Math.sin(angle)*speed-70;
    const rot=Math.random()*720-360;
    const dur=600+Math.random()*500;
    const color=colors[Math.floor(Math.random()*colors.length)];
    const br=Math.random()>0.4?'50%':'2px';
    el.style.cssText=`
      position:fixed;left:${cx}px;top:${cy}px;
      width:${sz}px;height:${sz}px;
      background:${color};border-radius:${br};
      pointer-events:none;z-index:9999;
      transform:translate(-50%,-50%) translate(0px,0px) rotate(0deg);
      opacity:1;
      transition:transform ${dur}ms cubic-bezier(0,0.9,0.57,1),opacity ${dur}ms ease;
    `;
    document.body.appendChild(el);
    // force reflow — critical for iOS
    void el.getBoundingClientRect();
    el.style.transform=`translate(-50%,-50%) translate(${dx}px,${dy+120}px) rotate(${rot}deg)`;
    el.style.opacity='0';
    setTimeout(()=>{ if(el.parentNode) el.remove(); }, dur+100);
  }
}

// ── RENDER CHIPS ───────────────────────────────────────────────────────
function renderChips(seq, workColor, breakColor){
  const tickSvg=`<svg viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const html=seq.map((s,i)=>{
    const isDone=completedSet.has(i), isActive=i===stepIdx;
    const cls=isActive?'chip active':isDone?'chip done':'chip';
    const dotCls=s.type==='work'?'chip-dot work':'chip-dot brk';
    const bg=isActive?(s.type==='work'?'rgba(160,80,40,0.14)':'rgba(40,120,80,0.14)'):'transparent';
    const dotColor=s.type==='work'?workColor:breakColor;
    const indicator=(isDone&&s.type==='work')
      ?`<div class="chip-tick">${tickSvg}</div>`
      :`<div class="${dotCls}" style="background:${dotColor}"></div>`;
    return `<div class="${cls}" style="background:${bg}" id="chip-${i}" onclick="goTo(${i})">${indicator}<div class="chip-dur">${s.mins}m</div><div class="chip-lbl">${s.type==='work'?'wk':'rst'}</div></div>`;
  }).join('');
  document.getElementById('chips-row').innerHTML=html;
}

// ── MAIN RENDER ────────────────────────────────────────────────────────
function render(){
  const seq=buildSeq();
  const step=seq[stepIdx]||seq[seq.length-1];
  const theme=THEMES.find(t=>t.id===themeId);
  const app=document.getElementById('app');
  THEMES.forEach(t=>app.classList.remove(t.cls));
  app.classList.add(theme.cls);
  app.dataset.dark=theme.dark;

  const workColor=theme.dark?'#ffa070':'#b05c30';
  const breakColor=theme.dark?'#72e0a8':'#2a7850';

  renderChips(seq, workColor, breakColor);

  if(finished){
    document.getElementById('main-view').style.display='none';
    const fv=document.getElementById('finished-view');
    fv.style.display='flex';
    fv.innerHTML=`
      <div class="finished-title">All done ✦</div>
      <div class="finished-sub">Every block completed. Well done.</div>
      <button class="text-btn" onclick="restart()">Start over</button>`;
    return;
  }

  document.getElementById('finished-view').style.display='none';
  const mv=document.getElementById('main-view');
  mv.style.display='flex';

  const total=step.mins*60;
  const pct=total>0?((total-secsLeft)/total)*100:100;
  const color=step.type==='work'?workColor:breakColor;
  const m=Math.floor(secsLeft/60), s=secsLeft%60;
  const timeStr=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const label=step.type==='work'?'Focus':'Break';
  const note=step.type==='work'?`Block ${step.session} of ${workMins.length}`:'Rest up';

  mv.innerHTML=`
    <div class="phase-label" style="color:${color}">${label}</div>
    <div class="timer">${timeStr}</div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${color}"></div></div>
    <div class="controls">
      <button class="ctrl-btn" onclick="skip(-1)" ${stepIdx===0?'disabled':''}>⏮</button>
      <button class="ctrl-btn play-btn" onclick="togglePlay()">${running?'⏸':'▶'}</button>
      <button class="ctrl-btn" onclick="skip(1)" ${stepIdx===seq.length-1?'disabled':''}>⏭</button>
    </div>`;

  document.title=`${timeStr} — ${label} · Focus`;
}

// ── CONTROLS ───────────────────────────────────────────────────────────
function togglePlay(){ running=!running; if(running)startTick();else stopTick(); render(); }

function startTick(){
  stopTick();
  timer=setInterval(()=>{
    if(secsLeft<=1){
      secsLeft=0; stopTick(); running=false; chime();
      completedSet.add(stepIdx);
      const seq=buildSeq();
      const isWork=seq[stepIdx]?.type==='work';
      render();
      if(isWork){
        // slight delay so chip re-renders with tick first
        setTimeout(()=>{
          const chipEl=document.getElementById(`chip-${stepIdx}`);
          if(chipEl) fireConfetti(chipEl);
        }, 80);
      }
      const next=stepIdx+1;
      if(next>=seq.length){ finished=true; setTimeout(()=>render(),1000); }
      else { setTimeout(()=>{ stepIdx=next; secsLeft=seq[next].mins*60; render(); },900); }
      return;
    }
    secsLeft--; render();
  },1000);
}

function stopTick(){ clearInterval(timer); timer=null; }

function goTo(i){
  const seq=buildSeq();
  if(i>=0&&i<seq.length){ stopTick();running=false;finished=false;stepIdx=i;secsLeft=seq[i].mins*60;render(); }
}
function skip(dir){ goTo(stepIdx+dir); }
function restart(){
  stopTick();running=false;finished=false;
  stepIdx=0;secsLeft=workMins[0]*60;completedSet=new Set();render();
}

// ── THEME PANEL ────────────────────────────────────────────────────────
document.getElementById('btn-bg').addEventListener('click',()=>{
  const isDark=THEMES.find(t=>t.id===themeId).dark;
  const swatches=THEMES.map(t=>`<div class="bg-swatch ${t.id===themeId?'sel':''}" style="background:${t.bg}" onclick="setTheme('${t.id}')">${t.lbl}</div>`).join('');
  showPanel(`<div class="panel-handle"></div><div class="panel-title">Background</div><div class="bg-grid">${swatches}</div><button class="text-btn" style="width:100%" onclick="closePanel()">Done</button>`,
    isDark?'#1e2530':'#f8f2e8', isDark?'rgba(238,228,210,0.9)':'rgba(40,28,16,0.85)');
});

function setTheme(id){
  themeId=id; render();
  document.querySelectorAll('.bg-swatch').forEach(el=>{
    el.classList.toggle('sel',el.getAttribute('onclick').includes(`'${id}'`));
  });
}

// ── EDIT PANEL ─────────────────────────────────────────────────────────
document.getElementById('btn-edit').addEventListener('click',()=>{
  const isDark=THEMES.find(t=>t.id===themeId).dark;
  let rows='';
  workMins.forEach((w,i)=>{
    rows+=`<div class="edit-row"><label>Work block ${i+1}</label><input class="edit-input" type="number" min="1" max="120" id="w${i}" value="${w}"><span class="edit-unit">min</span></div>`;
    if(i<workMins.length-1) rows+=`<div class="edit-row" style="opacity:0.72"><label>Break after block ${i+1}</label><input class="edit-input" type="number" min="1" max="60" id="b${i}" value="${breakMins[i]||10}"><span class="edit-unit">min</span></div>`;
  });
  showPanel(`<div class="panel-handle"></div><div class="panel-title">Edit timers</div><p style="font-size:0.8rem;margin-bottom:1rem;opacity:0.5">Changes restart the session.</p>${rows}<button class="save-btn" onclick="saveEdit()">Save & restart</button>`,
    isDark?'#1e2530':'#f8f2e8', isDark?'rgba(238,228,210,0.9)':'rgba(40,28,16,0.85)');
});

function saveEdit(){
  workMins=workMins.map((_,i)=>Math.max(1,Math.min(120,parseInt(document.getElementById('w'+i)?.value)||5)));
  breakMins=breakMins.map((_,i)=>Math.max(1,Math.min(60,parseInt(document.getElementById('b'+i)?.value)||5)));
  closePanel(); stopTick(); running=false; finished=false;
  stepIdx=0; secsLeft=workMins[0]*60; completedSet=new Set(); render();
}

function showPanel(html,bg,textColor){
  closePanel();
  const overlay=document.createElement('div');
  overlay.className='panel-overlay'; overlay.id='panel-overlay';
  overlay.addEventListener('click',e=>{ if(e.target===overlay)closePanel(); });
  const panel=document.createElement('div');
  panel.className='panel'; panel.style.cssText=`background:${bg};color:${textColor}`;
  panel.innerHTML=html; overlay.appendChild(panel); document.body.appendChild(overlay);
}
function closePanel(){ const el=document.getElementById('panel-overlay'); if(el)el.remove(); }

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}

render();
</script>
</body>
</html>
