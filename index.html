<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Focus">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" id="theme-meta" content="#f5ede0">
<title>Focus Timer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --text: rgba(40,28,16,0.90); --muted: rgba(40,28,16,0.35);
  --btn: rgba(0,0,0,0.07); --btn-b: rgba(0,0,0,0.12);
  --card: rgba(255,255,255,0.35); --card-b: rgba(0,0,0,0.10);
  --work: #b05c30; --brk: #2a7850; --accent: #7a4a28;
  --input-bg: rgba(0,0,0,0.08); --input-text: rgba(40,28,16,0.88);
  --track: rgba(0,0,0,0.10); --neon: #39ff84;
}
[data-dark="true"] {
  --text: rgba(238,228,210,0.93); --muted: rgba(238,228,210,0.35);
  --btn: rgba(255,255,255,0.09); --btn-b: rgba(255,255,255,0.16);
  --card: rgba(0,0,0,0.28); --card-b: rgba(255,255,255,0.10);
  --work: #ffa070; --brk: #72e0a8; --accent: #ffc090;
  --input-bg: rgba(255,255,255,0.12); --input-text: rgba(238,228,210,0.92);
  --track: rgba(255,255,255,0.10); --neon: #39ff84;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; font-family: 'DM Sans', sans-serif; overflow: hidden; }
body { position: fixed; inset: 0; }

#app {
  width: 100%; height: 100%; height: 100dvh;
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.5s ease;
}

/* ── THEMES ── */
.t-sand   { background: linear-gradient(160deg,#f5ede0,#e8d5b7,#f0e0c8); }
.t-sage   { background: linear-gradient(160deg,#d4e8d0,#b8d4b2,#cce0c8); }
.t-ocean  { background: linear-gradient(160deg,#d0e8f4,#b0d4ec,#c8e0f0); }
.t-rose   { background: linear-gradient(160deg,#f4d0d8,#edb8c4,#f0c8d0); }
.t-slate  { background: linear-gradient(160deg,#2c3e50,#34495e,#2a3a4a); }
.t-dusk   { background: linear-gradient(160deg,#e8d5f0,#d4b8e8,#e0ccf4); }
.t-night  { background: linear-gradient(160deg,#1a1a2e,#16213e,#0f3060); }
.t-forest { background: linear-gradient(160deg,#1a2e1a,#1e3a1e,#243024); }
.t-black  { background: #000; }
.t-ink    { background: linear-gradient(160deg,#0a0a0f,#111118,#0d0d14); }
.t-terra  { background: linear-gradient(160deg,#3d1c10,#5a2a18,#3d1c10); }
.t-stone  { background: linear-gradient(160deg,#2a2a28,#383835,#2a2a28); }
.t-cream  { background: linear-gradient(160deg,#faf6ef,#f2ebe0,#faf6ef); }
.t-mist   { background: linear-gradient(160deg,#dde4ec,#c8d4e0,#dde4ec); }

/* ── TOP BAR ── */
.top-bar {
  position: absolute;
  top: max(env(safe-area-inset-top,14px),14px);
  right: max(env(safe-area-inset-right,14px),14px);
  display: flex; gap: 8px; z-index: 10;
}
.icon-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--btn); border: 0.5px solid var(--btn-b); color: var(--text);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.12s;
}
.icon-btn:active { transform: scale(0.88); }

/* ── TIMER AREA ── */
.timer-area {
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  width: 100%; padding: 0 2vw;
}
.phase-label {
  font-size: clamp(0.5rem, 1.4vw, 0.78rem);
  font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase;
  margin-bottom: 0.3em; opacity: 0.75; transition: color 0.3s; white-space: nowrap;
}
.timer {
  font-family: 'Nunito', sans-serif; font-weight: 900;
  line-height: 1; letter-spacing: -0.03em; color: var(--text);
  white-space: nowrap; font-size: 20vw;
}
.controls { display: flex; align-items: center; gap: clamp(16px,3vw,28px); margin-top: clamp(1.5rem, 5vh, 3.5rem); }
.ctrl-btn {
  background: none; border: none; padding: 6px;
  color: var(--text); opacity: 0.45;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.12s, opacity 0.15s;
}
.ctrl-btn:hover  { opacity: 0.75; }
.ctrl-btn:active { transform: scale(0.88); opacity: 1; }
.ctrl-btn:disabled { opacity: 0.15; pointer-events: none; }
.play-btn { opacity: 0.65; }

/* ══════════════════════════════════════════════════
   MOBILE: dot indicators (default, < 900px)
══════════════════════════════════════════════════ */
.session-dots {
  position: absolute;
  display: flex; align-items: center; justify-content: center;
  gap: 5px; z-index: 5;
  /* Portrait: horizontal at bottom */
  flex-direction: row;
  bottom: max(env(safe-area-inset-bottom,12px),12px);
  left: 0; right: 0;
}
/* Landscape phone: vertical on right */
@media (orientation: landscape) and (max-width: 899px) {
  .session-dots {
    flex-direction: column;
    right: max(env(safe-area-inset-right,14px),14px);
    top: 50%; bottom: auto; left: auto;
    transform: translateY(-50%);
  }
}
.s-dot {
  flex-shrink: 0; width: 9px; height: 9px; cursor: pointer;
  transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.s-dot.work-dot  { border-radius: 2px; }
.s-dot.break-dot { border-radius: 50%; }
.s-dot.is-active { transform: scale(1.5); box-shadow: 0 0 0 1.5px rgba(255,255,255,0.35); }
.s-dot.is-done-work {
  background: var(--neon) !important; border-radius: 50% !important;
  box-shadow: 0 0 5px var(--neon), 0 0 10px rgba(57,255,132,0.4);
}
.s-dot.is-done-work::after {
  content: '';
  display: block; width: 5px; height: 5px;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4L3.5 6.5L9 1' stroke='%23003319' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") center/contain no-repeat;
}
.s-dot.is-past { opacity: 0.28; }
.s-dot:active  { transform: scale(0.88); }

/* Desktop: hide dots */
@media (min-width: 900px) {
  .session-dots { display: none !important; }
}
@media (orientation: landscape) and (max-width: 899px) {
  #timer-display { transform: scaleY(1.3); transform-origin: center; }
}
/* ══════════════════════════════════════════════════
   DESKTOP: chip strip at bottom (≥ 900px only)
══════════════════════════════════════════════════ */
.chips-footer {
  display: none; /* hidden on mobile */
  position: absolute;
  bottom: max(env(safe-area-inset-bottom,16px),16px);
  left: 0; right: 0;
  justify-content: center;
  padding: 0 1rem;
}
@media (min-width: 900px) {
  .chips-footer { display: flex; }
  /* On desktop: leave bottom padding in timer area for chips */
  #app { padding-bottom: 90px; }
}
.chips {
  display: flex; flex-wrap: nowrap;
  justify-content: center; align-items: center; gap: 5px;
}
.chip {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 8px; border-radius: 10px; cursor: pointer;
  transition: transform 0.15s, background 0.2s; min-width: 40px; flex-shrink: 0;
}
.chip:active { transform: scale(0.93); }
.chip.active { transform: scale(1.06); }
.chip.done   { opacity: 0.40; }
.chip-dot      { width: 7px; height: 7px; }
.chip-dot.work { border-radius: 2px; }
.chip-dot.brk  { border-radius: 50%; }
.chip-tick {
  width: 13px; height: 13px; border-radius: 50%; background: #22c55e;
  display: flex; align-items: center; justify-content: center;
  animation: tickPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes tickPop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.chip-tick svg { width: 7px; height: 7px; }
.chip-dur { font-size: 0.68rem; font-family: 'DM Sans', sans-serif; color: var(--text); font-weight: 500; }
.chip-lbl { font-size: 0.5rem; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }

/* ── FINISHED ── */
.finished-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; width: 100%; height: 100%; padding: 2rem;
}
.finished-title { font-family: 'DM Serif Display', serif; font-size: clamp(2rem,8vw,4.5rem); color: var(--text); margin-bottom: 0.5rem; }
.finished-sub { font-size: clamp(0.8rem,2vw,1rem); color: var(--muted); margin-bottom: 2.5rem; }
.text-btn {
  padding: 12px 32px; border-radius: 24px;
  background: var(--btn); border: 0.5px solid var(--btn-b); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.95rem; cursor: pointer; transition: transform 0.12s;
}
.text-btn:active { transform: scale(0.95); }

/* ── PANELS ── */
.panel-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 20; display: flex; align-items: flex-end; animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0}to{opacity:1} }
.panel {
  width: 100%; max-height: 88vh; border-radius: 20px 20px 0 0;
  padding: 1.5rem 1.25rem calc(env(safe-area-inset-bottom,16px) + 1rem);
  overflow-y: auto; animation: slideUp 0.25s ease;
}
@keyframes slideUp { from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1} }
.panel-handle { width: 38px; height: 4px; background: var(--track); border-radius: 2px; margin: 0 auto 1.2rem; }
.panel-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text); margin-bottom: 1rem; }
.edit-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-radius: 10px; background: var(--card); border: 0.5px solid var(--card-b); margin-bottom: 6px;
}
.edit-row label { flex:1; font-size: 0.85rem; color: var(--text); }
.edit-input {
  width: 60px; padding: 6px 8px; border-radius: 7px;
  background: var(--input-bg); color: var(--input-text);
  font-family: 'DM Sans', sans-serif; font-size: 0.95rem; text-align: center; border: none; outline: none;
}
.edit-unit { font-size: 0.75rem; color: var(--muted); }
.save-btn {
  width: 100%; padding: 14px; border-radius: 14px; background: var(--accent); color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500;
  border: none; cursor: pointer; margin-top: 1rem; transition: transform 0.12s;
}
.save-btn:active { transform: scale(0.97); }
.bg-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.2rem; }
.bg-swatch {
  aspect-ratio: 1; border-radius: 10px; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px;
  font-size: 0.58rem; color: rgba(255,255,255,0.8); font-weight: 500;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.bg-swatch.sel { border-color: rgba(255,255,255,0.8); transform: scale(1.06); }
</style>
</head>
<body>
<div id="app" class="t-sand">
  <div class="top-bar">
    <button class="icon-btn" id="btn-edit" aria-label="Edit timers">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
    </button>
    <button class="icon-btn" id="btn-bg" aria-label="Change background">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>

  <div class="timer-area" id="timer-area">
    <div class="phase-label" id="phase-label">FOCUS</div>
    <div class="timer" id="timer-display">50:00</div>
    <div class="controls" id="controls"></div>
  </div>

  <div class="finished-screen" id="finished-screen" style="display:none"></div>

  <!-- Mobile: tiny dots -->
  <div class="session-dots" id="session-dots"></div>

  <!-- Desktop: full chip strip -->
  <div class="chips-footer"><div class="chips" id="chips-row"></div></div>
</div>

<script>
const THEMES = [
  { id:'sand',  cls:'t-sand',   dark:false, bg:'linear-gradient(135deg,#f5ede0,#e8d5b7)', lbl:'Sand',   tc:'#f0e0c8' },
  { id:'sage',  cls:'t-sage',   dark:false, bg:'linear-gradient(135deg,#d4e8d0,#b8d4b2)', lbl:'Sage',   tc:'#c8dcc4' },
  { id:'ocean', cls:'t-ocean',  dark:false, bg:'linear-gradient(135deg,#d0e8f4,#b0d4ec)', lbl:'Ocean',  tc:'#c4dced' },
  { id:'rose',  cls:'t-rose',   dark:false, bg:'linear-gradient(135deg,#f4d0d8,#edb8c4)', lbl:'Rose',   tc:'#eebcc8' },
  { id:'slate', cls:'t-slate',  dark:true,  bg:'linear-gradient(135deg,#2c3e50,#34495e)', lbl:'Slate',  tc:'#2c3e50' },
  { id:'dusk',  cls:'t-dusk',   dark:false, bg:'linear-gradient(135deg,#e8d5f0,#d4b8e8)', lbl:'Dusk',   tc:'#e0ccf4' },
  { id:'night', cls:'t-night',  dark:true,  bg:'linear-gradient(135deg,#1a1a2e,#0f3060)', lbl:'Night',  tc:'#16213e' },
  { id:'forest',cls:'t-forest', dark:true,  bg:'linear-gradient(135deg,#1a2e1a,#243024)', lbl:'Forest', tc:'#1a2e1a' },
  { id:'black', cls:'t-black',  dark:true,  bg:'#000',                                    lbl:'Black',  tc:'#000000' },
  { id:'ink',   cls:'t-ink',    dark:true,  bg:'linear-gradient(135deg,#0a0a0f,#111118)', lbl:'Ink',    tc:'#0a0a0f' },
  { id:'terra', cls:'t-terra',  dark:true,  bg:'linear-gradient(135deg,#3d1c10,#5a2a18)', lbl:'Terra',  tc:'#3d1c10' },
  { id:'stone', cls:'t-stone',  dark:true,  bg:'linear-gradient(135deg,#2a2a28,#383835)', lbl:'Stone',  tc:'#2a2a28' },
  { id:'cream', cls:'t-cream',  dark:false, bg:'linear-gradient(135deg,#faf6ef,#f2ebe0)', lbl:'Cream',  tc:'#f8f3eb' },
  { id:'mist',  cls:'t-mist',   dark:false, bg:'linear-gradient(135deg,#dde4ec,#c8d4e0)', lbl:'Mist',   tc:'#d8e2ec' },
];

let workMins=[ 50,40,30,20,10];
let breakMins=[10,10,10,10];
let themeId='sand', stepIdx=0, secsLeft=workMins[0]*60;
let running=false, finished=false, timer=null;
let completedSet=new Set();

function buildSeq(){
  const s=[];
  workMins.forEach((w,i)=>{
    s.push({type:'work',mins:w,session:i+1});
    if(i<workMins.length-1) s.push({type:'break',mins:breakMins[i]||10,session:i+1});
  });
  return s;
}

const isDesktop=()=>window.innerWidth>=900;

// ── FIT TIMER (JS binary search) ───────────────────────────────────────
function fitTimer(){
  const el=document.getElementById('timer-display');
  if(!el||finished) return;
  const area=document.getElementById('timer-area');

  const isLand=window.innerWidth>window.innerHeight;
  const mobile=!isDesktop();
  const dotStrip= mobile&&isLand ? 58 : 0;

  const availW=(window.innerWidth - dotStrip - 36)*0.93;
  const availH=window.innerHeight*(isDesktop()?0.62:0.84);

  el.style.whiteSpace='nowrap';
  let lo=12, hi=1200;
  while(lo<hi-1){
    const mid=(lo+hi)>>1;
    el.style.fontSize=mid+'px';
    if(el.scrollWidth<=availW && el.offsetHeight<=availH) lo=mid; else hi=mid;
  }
  el.style.fontSize=lo+'px';

  // landscape mobile: nudge timer left to make room for dots
  area.style.paddingRight = (mobile&&isLand) ? (dotStrip+8)+'px' : '2vw';
}

// ── AUDIO ──────────────────────────────────────────────────────────────
function chime(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const dark=THEMES.find(t=>t.id===themeId)?.dark;
    [0,0.18,0.36].forEach((delay,i)=>{
      const freqs=dark?[392,494,587]:[523,659,784];
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freqs[i];o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+delay);
      g.gain.linearRampToValueAtTime(0.2,ctx.currentTime+delay+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.75);
      o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+0.8);
    });
  }catch(e){}
}

// ── CONFETTI ───────────────────────────────────────────────────────────
function fireConfetti(el){
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const colors=['#39ff84','#ffd93d','#ff6b6b','#4d96ff','#ff85e1','#ffb347','#80d8ff','#fff'];
  for(let i=0;i<30;i++){
    const d=document.createElement('div');
    const sz=2+Math.random()*5;
    const angle=Math.random()*Math.PI*2;
    const spd=55+Math.random()*110;
    const dx=Math.cos(angle)*spd, dy=Math.sin(angle)*spd-80;
    const rot=Math.random()*720-360, dur=500+Math.random()*600;
    d.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.4?'50%':'2px'};
      pointer-events:none;z-index:9999;
      transform:translate(-50%,-50%) translate(0,0) rotate(0deg);opacity:1;
      transition:transform ${dur}ms cubic-bezier(0,0.9,0.57,1),opacity ${dur}ms ease;`;
    document.body.appendChild(d);
    void d.getBoundingClientRect();
    d.style.transform=`translate(-50%,-50%) translate(${dx}px,${dy+130}px) rotate(${rot}deg)`;
    d.style.opacity='0';
    setTimeout(()=>{ if(d.parentNode)d.remove(); },dur+100);
  }
}

// ── RENDER MOBILE DOTS ─────────────────────────────────────────────────
function renderDots(seq,wc,bc){
  const c=document.getElementById('session-dots');
  c.innerHTML=seq.map((s,i)=>{
    const done=completedSet.has(i), active=i===stepIdx, past=i<stepIdx&&!done;
    let cls=`s-dot ${s.type==='work'?'work-dot':'break-dot'}`;
    if(done&&s.type==='work') cls+=' is-done-work';
    else if(active) cls+=' is-active';
    else if(past)   cls+=' is-past';
    const color=(done&&s.type==='work')?'var(--neon)':active?(s.type==='work'?wc:bc):s.type==='work'?wc:bc;
    const op=past?0.28:active?1:0.55;
    return `<div class="${cls}" style="background:${color};opacity:${op}" id="dot-${i}" onclick="goTo(${i})" title="${s.mins}m ${s.type}"></div>`;
  }).join('');
}

// ── RENDER DESKTOP CHIPS ───────────────────────────────────────────────
function renderChips(seq,wc,bc){
  const tickSvg=`<svg viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  document.getElementById('chips-row').innerHTML=seq.map((s,i)=>{
    const done=completedSet.has(i), active=i===stepIdx;
    const cls=active?'chip active':done?'chip done':'chip';
    const dotCls=`chip-dot ${s.type==='work'?'work':'brk'}`;
    const bg=active?(s.type==='work'?'rgba(160,80,40,0.14)':'rgba(40,120,80,0.14)'):'transparent';
    const dotColor=s.type==='work'?wc:bc;
    const indicator=(done&&s.type==='work')
      ?`<div class="chip-tick">${tickSvg}</div>`
      :`<div class="${dotCls}" style="background:${dotColor}"></div>`;
    return `<div class="${cls}" style="background:${bg}" id="chip-${i}" onclick="goTo(${i})">${indicator}<div class="chip-dur">${s.mins}m</div><div class="chip-lbl">${s.type==='work'?'work':'rest'}</div></div>`;
  }).join('');
}

// ── MAIN RENDER ────────────────────────────────────────────────────────
function render(){
  const seq=buildSeq();
  const step=seq[stepIdx]||seq[seq.length-1];
  const theme=THEMES.find(t=>t.id===themeId);
  const app=document.getElementById('app');
  THEMES.forEach(t=>app.classList.remove(t.cls));
  document.getElementById('theme-meta')?.setAttribute('content', theme.tc);
  document.documentElement.style.backgroundColor = theme.tc;
  app.classList.add(theme.cls);
  app.dataset.dark=theme.dark;
  const wc=theme.dark?'#ffa070':'#b05c30';
  const bc=theme.dark?'#72e0a8':'#2a7850';
  const color=step.type==='work'?wc:bc;

  renderDots(seq,wc,bc);
  renderChips(seq,wc,bc);

  if(finished){
    document.getElementById('timer-area').style.display='none';
    document.getElementById('session-dots').style.display='none';
    document.querySelector('.chips-footer').style.display='none';
    const fs=document.getElementById('finished-screen');
    fs.style.display='flex';
    fs.innerHTML=`<div class="finished-title">All done ✦</div>
      <div class="finished-sub">Every block completed. Well done.</div>
      <button class="text-btn" onclick="restart()">Start over</button>`;
    return;
  }

  document.getElementById('timer-area').style.display='flex';
  document.getElementById('finished-screen').style.display='none';
  document.getElementById('session-dots').style.removeProperty('display');
  document.querySelector('.chips-footer').style.removeProperty('display');

  document.getElementById('phase-label').textContent=step.type==='work'?'FOCUS':'BREAK';
  document.getElementById('phase-label').style.color=color;

  const m=Math.floor(secsLeft/60),s=secsLeft%60;
  const timeStr=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('timer-display').textContent=timeStr;

  const IC = {
    prev:`<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>`,
    next:`<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18 6h-2v12h2zm-3.5 6L6 6v12z"/></svg>`,
    play:`<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l14 8-14 8z"/></svg>`,
    pause:`<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>`,
  };
  document.getElementById('controls').innerHTML=`
    <button class="ctrl-btn" onclick="skip(-1)" ${stepIdx===0?'disabled':''}>${IC.prev}</button>
    <button class="ctrl-btn play-btn" onclick="togglePlay()">${running?IC.pause:IC.play}</button>
    <button class="ctrl-btn" onclick="skip(1)" ${stepIdx===seq.length-1?'disabled':''}>${IC.next}</button>`;

  requestAnimationFrame(fitTimer);
  document.title=`${timeStr} · ${step.type==='work'?'Focus':'Break'}`;
}

// ── CONTROLS ───────────────────────────────────────────────────────────
function togglePlay(){ running=!running; if(running)startTick();else stopTick(); render(); }

function startTick(){
  stopTick();
  timer=setInterval(()=>{
    if(secsLeft<=1){
      secsLeft=0; stopTick(); running=false; chime();
      completedSet.add(stepIdx);
      const seq=buildSeq();
      const isWork=seq[stepIdx]?.type==='work';
      render();
      if(isWork){
        setTimeout(()=>{
          // fire from dot on mobile, chip on desktop
          const el=isDesktop()
            ? document.getElementById(`chip-${stepIdx}`)
            : document.getElementById(`dot-${stepIdx}`);
          if(el) fireConfetti(el);
        },100);
      }
      const next=stepIdx+1;
      if(next>=seq.length){ finished=true; setTimeout(()=>render(),1000); }
      else { setTimeout(()=>{ stepIdx=next; secsLeft=seq[next].mins*60; render(); },900); }
      return;
    }
    secsLeft--; render();
  },1000);
}

function stopTick(){ clearInterval(timer); timer=null; }
function goTo(i){
  const seq=buildSeq();
  if(i>=0&&i<seq.length){ stopTick();running=false;finished=false;stepIdx=i;secsLeft=seq[i].mins*60;render(); }
}
function skip(dir){ goTo(stepIdx+dir); }
function restart(){
  stopTick();running=false;finished=false;
  stepIdx=0;secsLeft=workMins[0]*60;completedSet=new Set();
  document.getElementById('session-dots').style.removeProperty('display');
  document.querySelector('.chips-footer').style.removeProperty('display');
  render();
}

// ── THEME PANEL ────────────────────────────────────────────────────────
document.getElementById('btn-bg').addEventListener('click',()=>{
  const isDark=THEMES.find(t=>t.id===themeId).dark;
  const sw=THEMES.map(t=>`<div class="bg-swatch ${t.id===themeId?'sel':''}" style="background:${t.bg}" onclick="setTheme('${t.id}')">${t.lbl}</div>`).join('');
  showPanel(`<div class="panel-handle"></div><div class="panel-title">Background</div><div class="bg-grid">${sw}</div><button class="text-btn" style="width:100%" onclick="closePanel()">Done</button>`,
    isDark?'#1e2530':'#f8f2e8',isDark?'rgba(238,228,210,0.9)':'rgba(40,28,16,0.85)');
});
function setTheme(id){
  themeId=id; render();
  document.querySelectorAll('.bg-swatch').forEach(el=>el.classList.toggle('sel',el.getAttribute('onclick').includes(`'${id}'`)));
}

// ── EDIT PANEL ─────────────────────────────────────────────────────────
document.getElementById('btn-edit').addEventListener('click',()=>{
  const isDark=THEMES.find(t=>t.id===themeId).dark;
  let rows='';
  workMins.forEach((w,i)=>{
    rows+=`<div class="edit-row"><label>Work block ${i+1}</label><input class="edit-input" type="number" min="1" max="120" id="w${i}" value="${w}"><span class="edit-unit">min</span></div>`;
    if(i<workMins.length-1) rows+=`<div class="edit-row" style="opacity:0.7"><label>Break after block ${i+1}</label><input class="edit-input" type="number" min="1" max="60" id="b${i}" value="${breakMins[i]||10}"><span class="edit-unit">min</span></div>`;
  });
  showPanel(`<div class="panel-handle"></div><div class="panel-title">Edit timers</div><p style="font-size:0.8rem;margin-bottom:1rem;opacity:0.5">Changes restart the session.</p>${rows}<button class="save-btn" onclick="saveEdit()">Save & restart</button>`,
    isDark?'#1e2530':'#f8f2e8',isDark?'rgba(238,228,210,0.9)':'rgba(40,28,16,0.85)');
});
function saveEdit(){
  workMins=workMins.map((_,i)=>Math.max(1,Math.min(120,parseInt(document.getElementById('w'+i)?.value)||5)));
  breakMins=breakMins.map((_,i)=>Math.max(1,Math.min(60,parseInt(document.getElementById('b'+i)?.value)||5)));
  closePanel();stopTick();running=false;finished=false;
  stepIdx=0;secsLeft=workMins[0]*60;completedSet=new Set();render();
}
function showPanel(html,bg,tc){
  closePanel();
  const ov=document.createElement('div');
  ov.className='panel-overlay';ov.id='panel-overlay';
  ov.addEventListener('click',e=>{ if(e.target===ov)closePanel(); });
  const p=document.createElement('div');
  p.className='panel';p.style.cssText=`background:${bg};color:${tc}`;
  p.innerHTML=html;ov.appendChild(p);document.body.appendChild(ov);
}
function closePanel(){ const el=document.getElementById('panel-overlay');if(el)el.remove(); }

window.addEventListener('resize',()=>requestAnimationFrame(fitTimer));
window.addEventListener('orientationchange',()=>setTimeout(()=>render(),150));
screen.orientation?.addEventListener('change',()=>setTimeout(()=>render(),150));

if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));

render();
</script>
</body>
